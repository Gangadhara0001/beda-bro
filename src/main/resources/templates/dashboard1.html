<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 th:text="${station}"></h2>

    <h4>Total Reports :
        <span th:text="${count}"></span>
    </h4>

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>QR</th>

            <th>Activity</th>

            <th>Location</th>

            <th>Priority</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="r:${reports}">

            <td th:text="${r.qrCode}"></td>

            <td th:text="${r.activity}"></td>

            <td th:text="${r.location}"></td>

            <td th:text="${r.urgency}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
